name: Build APK PayBall

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📁 Siapin Folder www Otomatis
        run: |
          mkdir -p www
          mv *.html *.css *.js www/ 2>/dev/null || true
          mv assets www/ 2>/dev/null || true

      - name: 📦 Install Mesin Capacitor
        run: npm install

      - name: 🤖 Rakit Android
        run: |
          npx cap add android
          npx cap sync android

      - name: 🎨 Pasang Icon PayBall (Otomatis)
        run: |
          npm install @capacitor/assets
          # Memindahkan icon.png dari folder utama ke folder assets agar terdeteksi
          mkdir -p assets
          mv icon.png assets/icon.png 2>/dev/null || true
          npx @capacitor/assets generate --android

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗️ Proses Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 🚀 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PayBall-APK
          path: android/app/build/outputs/apk/debug/*.apk
          
