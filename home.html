<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayBall - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <div class="brand-title">PayBall</div>
            <div style="display:flex; gap:15px; align-items:center;">
                <!-- SAKLAR DARK MODE KOMIK -->
                <div onclick="toggleDarkMode()" style="cursor:pointer; font-size:1.5rem; text-shadow: 2px 2px 0px #0056FF;">🦇</div>
                
                <div class="menu-burger" onclick="openModal('modal-showcase')">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </header>

        <main id="section-home" class="page-section active">
            
            <div class="balance-card">
                <div class="bc-top">
                    <span class="bc-idr">IDR</span>
                    <span class="bc-logo">PayBall</span>
                    <div id="display-profile-pic" class="bc-profile" onclick="openModal('modal-profile-settings')"></div>
                </div>
                <div class="bc-middle">
                    <h1 id="display-saldo">Menyinkronkan...</h1>
                    <div class="bc-topup" onclick="openModal('modal-topup')">
                        <img src="https://cdn-icons-png.flaticon.com/512/8552/8552792.png" alt="TopUp">
                        <span>Top up</span>
                    </div>
                </div>
                <div class="bc-bottom">
                    <div>
                        <strong id="display-username">PayBall</strong><br>
                        <small>*Uang tabungan/darurat</small>
                    </div>
                    <div class="bc-wallet-icon"></div>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-bar-wrapper">
                    <div id="display-progress" class="progress-fill"></div>
                </div>
                <div class="progress-text-row">
                    <span id="display-device">Username</span>
                    <span id="display-ratio">0/6000</span>
                </div>
            </div>

            <div id="account-list" class="accounts-vertical-list" style="margin-top: 15px;"></div>
        </main>

        <main id="section-history" class="page-section">
            <div class="history-title-box">
                <h2>HISTORY</h2>
                <span>Buy.Sell</span>
            </div>

            <div class="slider-container">
                <span class="slider-arrow">&lt;</span>
                <div id="history-account-slider" class="slider-track"></div>
                <span class="slider-arrow">&gt;</span>
            </div>

            <div class="chart-and-summary">
                <div class="custom-chart-area">
                    <div class="chart-y-axis"></div>
                    <div class="chart-x-axis"></div>
                    <div class="chart-label-arrow arrow-sell">SELL ➔</div>
                    <div class="chart-label-arrow arrow-buy">BUY ➔</div>
                    <div id="chart-container" class="chart-bars-container"></div>
                </div>

                <div class="summary-stats-grid">
                    <div>
                        <strong>buy:<span id="hist-buy-count">0</span> Account</strong><br>
                        <strong>Sell:<span id="hist-sell-count">0</span> Account</strong>
                    </div>
                    <div style="text-align: right;">
                        <small>Total buy: <span id="hist-total-buy">0</span></small><br>
                        <small>Total sell: <span id="hist-total-sell">0</span></small><br>
                        <strong>Profit: <span id="hist-profit" style="font-size:1.1rem;">0</span></strong>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div id="nav-btn-home" class="nav-icon active" onclick="switchSection('home')">
                <img src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png" alt="Home">
            </div>
            <div class="nav-fab-center" onclick="openModal('modal-add-account')">
                <div class="fab-circle">+</div>
            </div>
            <div id="nav-btn-history" class="nav-icon" onclick="switchSection('history')">
                <img src="https://cdn-icons-png.flaticon.com/512/1157/1157002.png" alt="History">
            </div>
        </nav>

    </div>


    <div id="modal-profile-settings" class="modal-overlay">
        <div class="modal-content custom-add-box">
            <div class="modal-header-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="font-weight:900;">MY PROFILE</h2>
                <button onclick="closeModal('modal-profile-settings')" class="btn-close-detail" style="position:relative; top:0; right:0;">✕</button>
            </div>
            
            <div class="add-box-grid">
                <div class="add-photo-area" onclick="triggerProfileImageUpload()" style="border-radius:50%; width:90px; height:90px;">
                    <span id="profile-placeholder-icon">📸</span>
                    <img id="profile-image-preview" src="" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;">
                </div>
                <div class="add-inputs-right">
                    <label>Username</label>
                    <input type="text" id="in-profile-username" placeholder="Nama Anda">
                </div>
            </div>
            <button class="btn-mockup-ok" onclick="saveProfileSettings()" style="margin-top:10px;">SIMPAN PROFILE</button>
            
            <button class="btn-mockup-ok" onclick="logoutUser()" style="margin-top:10px; background:#F44336; color:#fff; border-color:#F44336;">LOGOUT</button>
            
            <input type="file" id="hidden-profile-file-input" accept="image/*" onchange="previewProfileImage(event)" style="display:none;">
        </div>
    </div>

    <div id="modal-add-account" class="modal-overlay">
        <div class="modal-content custom-add-box">
            <button class="btn-close-detail" onclick="closeModal('modal-add-account')">✕</button>
            
            <div class="add-box-grid" style="margin-top: 15px;">
                <div class="add-photo-area" onclick="triggerImageUpload()">
                    <span id="upload-placeholder-icon">+</span>
                    <img id="image-preview" src="" style="display:none;">
                </div>
                <div class="add-inputs-right">
                    <label>Gmail</label><input type="text" id="in-gmail">
                    <label>Password</label><input type="text" id="in-pass">
                </div>
            </div>
            
            <div class="add-inputs-bottom" style="display:block;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="input-col"><label>Sisa Login</label><input type="text" id="in-sisalogin" class="box-input" placeholder="Misal: 3"></div>
                    <div class="input-col"><label>Koin</label><input type="text" id="in-koin" class="box-input" placeholder="Misal: 1500"></div>
                    <div class="input-col"><label>Data</label><input type="text" id="in-data" class="box-input" placeholder="Aman/Tidak"></div>
                    <div class="input-col"><label>Manager DB</label><input type="number" id="in-mdb" class="box-input" placeholder="0"></div>
                    <div class="input-col"><label>Region</label><input type="text" id="in-region" class="box-input" value="Indonesia"></div>
                    <div class="input-col"><label>EPIC,ST,BT</label><input type="text" id="in-epic" class="box-input" placeholder="10, 2, 5"></div>
                </div>
                <div style="display:flex; justify-content:space-between; gap:10px; margin-top:15px; padding-top:15px; border-top:1px dashed #ccc;">
                    <div class="input-col" style="width:48%;"><label>Harga Beli</label><input type="number" id="in-beli" class="box-input"></div>
                    <div class="input-col" style="width:48%;"><label>Harga Jual</label><input type="number" id="in-jual" class="box-input"></div>
                </div>
            </div>
            
            <button class="btn-mockup-ok" onclick="saveNewAccount()">SIMPAN AKUN</button>
            <input type="file" id="hidden-file-input" accept="image/*" onchange="previewImage(event)" style="display:none;">
        </div>
    </div>

    <div id="modal-sell-process" class="modal-overlay">
        <div class="modal-content custom-sell-box">
            <button class="btn-close-detail" onclick="closeModal('modal-sell-process')" style="top: -10px; right: -10px;">✕</button>
            <div class="sell-header">
                <h2>SELL</h2>
                <button class="btn-circle-ok" onclick="executeSell()">OK</button>
            </div>
            <input type="number" id="sell-price-input" class="sell-input" placeholder="0">
        </div>
    </div>

    <div id="modal-topup" class="modal-overlay">
        <div class="modal-content custom-sell-box">
            <button class="btn-close-detail" onclick="closeModal('modal-topup')" style="top: -10px; right: -10px;">✕</button>
            <div class="sell-header">
                <h2>TOP UP</h2>
                <button class="btn-circle-ok" onclick="executeTopUp()">OK</button>
            </div>
            <input type="number" id="topup-amount-input" class="sell-input" placeholder="Nominal Rp">
        </div>
    </div>

    <div id="modal-account-detail" class="modal-overlay">
        <div class="modal-content custom-add-box" style="max-height:90vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="font-weight:900; font-style:italic;">EDIT DATA AKUN</h2>
                <button onclick="closeModal('modal-account-detail')" class="btn-close-detail" style="position:relative; top:0; right:0;">✕</button>
            </div>
            <div id="detail-img-container" class="detail-img-full" style="height:110px;"></div>
            
            <div style="display:flex; flex-direction:column; gap:8px; font-weight:bold; margin-bottom:15px;">
                <label>GMAIL</label><input type="text" id="detail-in-gmail" class="box-input" style="margin-top:0;">
                <label>PASSWORD</label><input type="text" id="detail-in-password" class="box-input" style="margin-top:0;">
                
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:5px;">
                    <div><label>Sisa Login</label><input type="text" id="detail-in-sisalogin" class="box-input"></div>
                    <div><label>Koin</label><input type="text" id="detail-in-koin" class="box-input"></div>
                    <div><label>Data</label><input type="text" id="detail-in-data" class="box-input"></div>
                    <div><label>Manager DB</label><input type="number" id="detail-in-mdb" class="box-input"></div>
                    <div><label>Region</label><input type="text" id="detail-in-region" class="box-input"></div>
                    <div><label>EPIC,ST,BT</label><input type="text" id="detail-in-epic" class="box-input"></div>
                </div>
                
                <div style="display:flex; justify-content:space-between; gap:10px; margin-top:10px; padding-top:10px; border-top:1px dashed #ccc;">
                    <div style="width:48%;"><label>HARGA BELI</label><input type="number" id="detail-in-beli" class="box-input"></div>
                    <div style="width:48%;"><label>EST JUAL</label><input type="number" id="detail-in-jual" class="box-input"></div>
                </div>
            </div>
            
            <button class="btn-mockup-ok" onclick="saveAccountEdits()" style="background:#0056FF; color:#fff; border-color:#0056FF;">SIMPAN PERUBAHAN</button>
        </div>
    </div>

    <div id="modal-success" class="modal-overlay" style="z-index: 10000;">
        <div class="modal-content custom-sell-box" style="text-align:center;">
            <h2 id="success-popup-title" style="color:#0056FF;">BERHASIL</h2>
            <p id="success-popup-message" style="margin:15px 0; font-weight:bold;"></p>
            <button class="btn-circle-ok" style="width:100%; border-radius:15px;" onclick="closeModal('modal-success')">OK</button>
        </div>
    </div>

    <div id="modal-showcase" class="modal-overlay">
        <div class="modal-content custom-add-box" style="max-height: 85vh; overflow-y: auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="font-weight:900; font-style:italic;">KATALOG AKUN</h2>
                <button onclick="closeModal('modal-showcase')" class="btn-close-detail" style="position:relative; top:0; right:0;">✕</button>
            </div>
            
            <div id="showcase-list" style="display: flex; flex-direction: column; gap: 15px;">
            </div>
        </div>
    </div>

    <div id="modal-history-detail" class="modal-overlay">
        <div class="modal-content custom-add-box" style="max-height:90vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="font-weight:900; font-style:italic;">DETAIL AKUN</h2>
                <button onclick="closeModal('modal-history-detail')" class="btn-close-detail" style="position:relative; top:0; right:0;">✕</button>
            </div>
            <div id="hist-detail-img" style="width:100%;height:130px;border-radius:15px;overflow:hidden;margin-bottom:15px;background:#eee;"></div>
            <div style="display:flex; flex-direction:column; gap:8px; font-weight:bold;">
                <label>GMAIL</label>
<div class="input-wrapper">
    <div id="hist-detail-gmail" class="box-input" style="background:#f5f5f5;"></div>
    <button type="button" class="toggle-btn" onclick="toggleText('hist-detail-gmail')">👁️</button>
</div>

<label>PASSWORD</label>
<div class="input-wrapper">
    <div id="hist-detail-password" class="box-input" style="background:#f5f5f5;"></div>
    <button type="button" class="toggle-btn" onclick="toggleText('hist-detail-password')">👁️</button>
</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:5px;">
                    <div><label>Sisa Login</label><div id="hist-detail-sisalogin" class="box-input" style="background:#f5f5f5;"></div></div>
                    <div><label>Koin</label><div id="hist-detail-koin" class="box-input" style="background:#f5f5f5;"></div></div>
                    <div><label>Data</label><div id="hist-detail-data" class="box-input" style="background:#f5f5f5;"></div></div>
                    <div><label>Manager DB</label><div id="hist-detail-mdb" class="box-input" style="background:#f5f5f5;"></div></div>
                    <div><label>Region</label><div id="hist-detail-region" class="box-input" style="background:#f5f5f5;"></div></div>
                    <div><label>EPIC,ST,BT</label><div id="hist-detail-epic" class="box-input" style="background:#f5f5f5;"></div></div>
                </div>
            </div>
            <button class="btn-mockup-ok" onclick="closeModal('modal-history-detail')" style="margin-top:15px;">TUTUP</button>
        </div>
    </div>

    <!-- Jangan lupa, ini versinya biar nggak nyangkut cache! -->
    <script src="home.js?v=100"></script>
</body>
</html>
